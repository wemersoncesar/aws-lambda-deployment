  name: deploy to lambda
  on:
    workflow_dispatch:
    push:
      branches:
        - main
      paths:
        - '**.py'
  jobs:
    deploy:
      runs-on: ubuntu-latest

      steps:
        - name: Prepare repo directory
          run: |
              mkdir -p ./lambda-code
              cd ./lambda-code

        - name: Checkout Repository
          uses: actions/checkout@v2
          with:
            fetch-depth: 2 # To fetch the current commit and its parent (so we can compare)

        - name: List artefact files with their timestamps to show that builds/downloads succeeded
          run: ls -lha
        - name: Install aws cli using pip3
          run: pip3 install awscli
        - name: Configure AWS credentials
          run: aws configure set aws_access_key_id ${{ secrets.AWS_ACCESS_KEY_ID }} && aws configure set aws_secret_access_key ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    