  name: deploy to lambda
  on:
    workflow_dispatch:
    push:
      branches:
        - main
      paths:
        - '**.py'
  jobs:
    deploy:
      runs-on: ubuntu-latest

      steps:
        - name: Prepare repo directory
          run: |
              mkdir -p ./lambda-code
              cd ./lambda-code

        - name: Checkout Repository
          uses: actions/checkout@v2

        
      
        - name: List artefact files with their timestamps to show that builds/downloads succeeded
          run: ls -lha
        - name: Install aws cli using pip3
          run: pip3 install awscli

        - name: Configure AWS credentials
          run: aws configure set aws_access_key_id ${{ vars.AWS_ACCESS_KEY_ID }} && aws configure set aws_secret_access_key ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        - name: Upload artefacts to AWS S3
          run: |
            # Constants
            S3_BUCKET=tinyflix-2024-03-06
            S3_KEY=prognos_lambda.zip
            LAMBDA_FUNCTION_NAME=tinyflix_function

            echo "Uploading files to S3"
            aws s3 cp af/app/emr.py s3://tinyflix-2024-03-06/here-is-my-code/
            aws s3 cp af/app/config.py s3://tinyflix-2024-03-06/here-is-my-code/
            aws s3 cp af/main.py s3://tinyflix-2024-03-06/here-is-my-code/
            echo "Upload finished!"
    
        - name: Zip Files
          run:  |
            zip -r prognos_lambda.zip af
            ls -la
            # Update Lambda function code
            pwd
            aws lambda update-function-code --function-name tinyflix_function --s3-bucket tinyflix-2024-03-06 --s3-key here-is-my-code/prognos_lambda.zip  --region us-east-1 --zip-file fileb://prognos_lambda.zip